<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Subtle outer glow ring -->
  <circle cx="52" cy="48" r="42" stroke="#6366f1" stroke-width="3" fill="none" opacity="0.25"/>
  
  <!-- Main magnifying glass lens (search/hunt) -->
  <circle cx="52" cy="48" r="28" fill="#09090b" stroke="#6366f1" stroke-width="6"/>
  
  <!-- Inner dark lens area -->
  <circle cx="52" cy="48" r="19" fill="#0f0f12"/>
  
  <!-- Hunting crosshair / target inside lens -->
  <line x1="35" y1="48" x2="69" y2="48" stroke="#a5b4fc" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="52" y1="33" x2="52" y2="63" stroke="#a5b4fc" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Center bounty coin being "found" -->
  <circle cx="52" cy="48" r="9" fill="#67f6d1" stroke="#09090b" stroke-width="2"/>
  <text x="52" y="52" text-anchor="middle" fill="#0f172a" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">$</text>
  
  <!-- Magnifying glass handle (claim direction) -->
  <line x1="76" y1="70" x2="95" y2="89" stroke="#6366f1" stroke-width="8" stroke-linecap="round"/>
  <!-- Handle accent ring -->
  <circle cx="90" cy="85" r="4" fill="#a5b4fc"/>
  
  <!-- BH monogram label -->
  <text x="60" y="102" text-anchor="middle" fill="#6366f1" font-family="system-ui, sans-serif" font-size="17" font-weight="700">BH</text>
</svg>